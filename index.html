<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHUVO – Master Your Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink:     #0a0a0f;
  --surface: #111118;
  --panel:   #16161f;
  --line:    rgba(255,255,255,0.08);
  --accent:  #7c5cfc;
  --accent2: #c45cfc;
  --gold:    #e8c97e;
  --text:    #e8e8f0;
  --muted:   rgba(232,232,240,0.42);
  --r: 20px;
}

html, body {
  min-height: 100vh;
  background: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ── BACKGROUND ── */
.scene {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}

/* Noise texture */
.scene::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  z-index: 1;
}

.gradient-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 30% 0%,   rgba(124,92,252,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 55% 45% at 80% 90%,  rgba(196,92,252,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 85% 15%,  rgba(232,201,126,0.07) 0%, transparent 50%),
    linear-gradient(160deg, #0a0a0f 0%, #0e0e1a 55%, #0a0a12 100%);
}

/* Geometric lines */
.geo {
  position: absolute; inset: 0; overflow: hidden;
}
.geo-line {
  position: absolute;
  background: linear-gradient(90deg, transparent, rgba(124,92,252,0.12), transparent);
  height: 1px;
  width: 100%;
  animation: geoDrift linear infinite;
}
@keyframes geoDrift {
  0%   { transform: translateY(0) scaleX(0.3); opacity: 0; }
  20%  { opacity: 1; transform: translateY(0) scaleX(1); }
  80%  { opacity: 0.5; }
  100% { transform: translateY(60px) scaleX(0.3); opacity: 0; }
}

/* Floating orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  animation: orbFloat ease-in-out infinite alternate;
}
.orb-a { width:380px; height:380px; background:rgba(124,92,252,0.15); top:-100px; left:-80px; animation-duration:9s; }
.orb-b { width:280px; height:280px; background:rgba(196,92,252,0.10); bottom:80px; right:-60px; animation-duration:7s; animation-delay:2s; }
.orb-c { width:200px; height:200px; background:rgba(232,201,126,0.06); top:50%; left:60%; animation-duration:11s; animation-delay:4s; }
@keyframes orbFloat {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(20px,-30px) scale(1.08); }
}

/* ── LAYOUT ── */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 20px 64px;
}

/* ── AE BADGE ── */
.ae-badge {
  position: fixed; top: 20px; right: 20px; z-index: 20;
  width: 52px; height: 52px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(124,92,252,0.45);
  box-shadow: 0 0 18px rgba(124,92,252,0.5), 0 4px 20px rgba(0,0,0,0.6);
  animation: floatAE 4s ease-in-out infinite;
  cursor: pointer;
  transition: box-shadow 0.3s;
}
.ae-badge:hover { box-shadow: 0 0 30px rgba(124,92,252,0.8), 0 4px 20px rgba(0,0,0,0.6); }
.ae-badge img { width:100%; height:100%; object-fit:cover; }
@keyframes floatAE {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-8px); }
}

/* ── CARD ── */
.card {
  width: 100%; max-width: 420px;
  background: rgba(17,17,24,0.72);
  backdrop-filter: blur(32px) saturate(160%);
  -webkit-backdrop-filter: blur(32px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 28px;
  padding: 40px 28px 44px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(124,92,252,0.1),
    0 32px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(124,92,252,0.08);
  animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn {
  0%   { opacity:0; transform: translateY(40px) scale(0.96); }
  100% { opacity:1; transform: translateY(0) scale(1); }
}

/* Top glow border */
.card::before {
  content: '';
  position: absolute; top:0; left:15%; right:15%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(124,92,252,0.7), rgba(196,92,252,0.5), transparent);
  animation: topLinePulse 3s ease-in-out infinite;
}
@keyframes topLinePulse {
  0%,100% { opacity:0.5; }
  50%      { opacity:1; }
}

/* Corner accents */
.corner {
  position: absolute;
  width: 18px; height: 18px;
  border-color: rgba(124,92,252,0.5);
  border-style: solid;
  pointer-events: none;
}
.corner-tl { top:12px; left:12px; border-width:1.5px 0 0 1.5px; border-radius:4px 0 0 0; }
.corner-tr { top:12px; right:12px; border-width:1.5px 1.5px 0 0; border-radius:0 4px 0 0; }
.corner-bl { bottom:12px; left:12px; border-width:0 0 1.5px 1.5px; border-radius:0 0 0 4px; }
.corner-br { bottom:12px; right:12px; border-width:0 1.5px 1.5px 0; border-radius:0 0 4px 0; }

/* ── PROFILE ── */
.profile-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 28px;
}

/* 3D rotating ring */
.avatar-wrap {
  position: relative;
  width: 130px; height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
  perspective: 600px;
}

.ring-3d {
  position: absolute;
  width: 150px; height: 150px;
  border-radius: 50%;
  border: 2px solid transparent;
  background:
    linear-gradient(var(--ink), var(--ink)) padding-box,
    conic-gradient(from 0deg, rgba(124,92,252,0.9), rgba(196,92,252,0.6), rgba(232,201,126,0.4), rgba(124,92,252,0.9)) border-box;
  animation: spin3d 6s linear infinite;
}
@keyframes spin3d {
  0%   { transform: rotateY(0deg) rotateX(10deg); }
  100% { transform: rotateY(360deg) rotateX(10deg); }
}

.ring-outer {
  position: absolute;
  width: 168px; height: 168px;
  border-radius: 50%;
  border: 1px solid rgba(124,92,252,0.15);
  animation: spinSlow 12s linear infinite reverse;
}
@keyframes spinSlow {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Orbit dots */
.orbit-dot {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(124,92,252,0.8);
  animation: orbitDot 6s linear infinite;
  transform-origin: 0 84px;
  left: 50%; top: 50%;
  margin-left: -3px; margin-top: -84px;
}
.orbit-dot:nth-child(2) { animation-delay: -2s; background: var(--accent2); box-shadow: 0 0 8px rgba(196,92,252,0.8); }
.orbit-dot:nth-child(3) { animation-delay: -4s; background: var(--gold); box-shadow: 0 0 8px rgba(232,201,126,0.8); }
@keyframes orbitDot {
  0%   { transform: rotate(0deg)   translateY(-84px); }
  100% { transform: rotate(360deg) translateY(-84px); }
}

.avatar {
  width: 118px; height: 118px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center;
  position: relative; z-index: 2;
  border: 2px solid rgba(124,92,252,0.4);
  filter: drop-shadow(0 0 16px rgba(124,92,252,0.6));
  transition: transform 0.4s ease, filter 0.4s ease;
}
.avatar:hover {
  transform: scale(1.04);
  filter: drop-shadow(0 0 28px rgba(196,92,252,0.9));
}

/* Status indicator */
.status-dot {
  position: absolute;
  bottom: 8px; right: 8px; z-index: 3;
  width: 14px; height: 14px;
  background: #22c55e;
  border-radius: 50%;
  border: 2.5px solid var(--ink);
  box-shadow: 0 0 10px rgba(34,197,94,0.7);
  animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%,100% { box-shadow: 0 0 6px rgba(34,197,94,0.6); }
  50%      { box-shadow: 0 0 14px rgba(34,197,94,0.9), 0 0 28px rgba(34,197,94,0.4); }
}

/* ── NAME ── */
.name-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.username {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2.1rem;
  letter-spacing: 0.06em;
  background: linear-gradient(135deg, #fff 0%, #c4b5fd 45%, #e879f9 80%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200%;
  animation: nameShimmer 5s linear infinite;
  filter: drop-shadow(0 0 10px rgba(124,92,252,0.4));
}
@keyframes nameShimmer {
  0%   { background-position: 0% center; }
  100% { background-position: 200% center; }
}

.verified {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  box-shadow: 0 0 12px rgba(124,92,252,0.6);
  flex-shrink: 0;
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.28em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 20px;
}

/* Stats row */
.stats-row {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
}
.stat-pill {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
  transition: border-color 0.3s, background 0.3s;
}
.stat-pill:hover {
  background: rgba(124,92,252,0.08);
  border-color: rgba(124,92,252,0.3);
}
.stat-num {
  display: block;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  color: #fff;
  letter-spacing: 0.02em;
}
.stat-lbl {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── DIVIDER ── */
.sep {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  margin: 0 0 24px;
}

/* ── BUTTONS ── */
.btn-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
}

/* Primary CTA */
.btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 17px 24px;
  border-radius: 14px;
  background: linear-gradient(135deg, #7c5cfc 0%, #a855f7 50%, #c45cfc 100%);
  background-size: 200% auto;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
  text-decoration: none;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(124,92,252,0.5),
    0 0 24px rgba(124,92,252,0.4),
    0 8px 24px rgba(0,0,0,0.5);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease, background-position 0.4s ease;
  animation: primaryGlow 3s ease-in-out infinite alternate;
}
@keyframes primaryGlow {
  0%   { box-shadow: 0 0 0 1px rgba(124,92,252,0.5), 0 0 20px rgba(124,92,252,0.35), 0 8px 24px rgba(0,0,0,0.5); }
  100% { box-shadow: 0 0 0 1px rgba(196,92,252,0.7), 0 0 40px rgba(124,92,252,0.55), 0 8px 24px rgba(0,0,0,0.5); }
}
.btn-primary::before {
  content: '';
  position: absolute; top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  animation: sweep 3.5s ease-in-out infinite;
  transform: skewX(-15deg);
}
@keyframes sweep {
  0%,60% { left:-100%; }
  100%    { left:200%; }
}
.btn-primary:hover {
  transform: translateY(-3px) scale(1.02);
  background-position: right center;
  box-shadow:
    0 0 0 1px rgba(196,92,252,0.8),
    0 0 50px rgba(124,92,252,0.65),
    0 12px 32px rgba(0,0,0,0.6);
}
.btn-primary:active { transform: translateY(-1px) scale(1.01); }

/* Social buttons */
.btn-social {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: 0.95rem;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s, box-shadow 0.25s, background 0.25s;
}

/* Platform accent line on left */
.btn-social::before {
  content: '';
  position: absolute; left:0; top:20%; bottom:20%; width:2px;
  border-radius: 2px;
  background: var(--btn-color, var(--accent));
  opacity: 0;
  transition: opacity 0.3s, height 0.3s;
}
.btn-social:hover::before { opacity: 1; }

/* Hover shimmer */
.btn-social::after {
  content: '';
  position: absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.0) 0%, rgba(255,255,255,0.03) 100%);
  opacity: 0;
  transition: opacity 0.3s;
}
.btn-social:hover {
  transform: translateY(-2px) translateX(3px);
  border-color: rgba(124,92,252,0.35);
  background: rgba(124,92,252,0.06);
  box-shadow: 0 0 20px rgba(124,92,252,0.2), 0 6px 20px rgba(0,0,0,0.4);
}
.btn-social:hover::after { opacity: 1; }
.btn-social:active { transform: translateY(0) translateX(1px); }

.btn-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.08);
  transition: transform 0.3s ease;
}
.btn-social:hover .btn-icon { transform: scale(1.08) rotate(-3deg); }

.btn-label {
  flex: 1;
  font-size: 0.95rem;
  font-weight: 500;
}

.btn-meta {
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-platform-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  background: rgba(255,255,255,0.05);
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
}
.btn-arrow {
  font-size: 1rem;
  color: var(--muted);
  transition: color 0.3s, transform 0.3s;
}
.btn-social:hover .btn-arrow { color: var(--text); transform: translateX(4px); }

/* ── VISITOR BADGE ── */
.visitor-wrap {
  margin-top: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.visitor-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: 50px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--muted);
}
.live-dot {
  width: 7px; height: 7px;
  background: #22c55e;
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(34,197,94,0.8);
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.5; transform:scale(0.7); }
}
.vcounter {
  font-weight: 600;
  color: #c4b5fd;
  font-size: 0.8rem;
}

/* ── PARTICLES ── */
#particles { position:absolute; inset:0; pointer-events:none; }
.p { position:absolute; border-radius:50%; pointer-events:none; animation: floatUp linear infinite; }
@keyframes floatUp {
  0%   { transform:translateY(0) scale(0); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:0.4; }
  100% { transform:translateY(-100vh) scale(1); opacity:0; }
}

/* ── REVEAL ANIMATIONS ── */
.reveal { opacity:0; transform:translateY(20px); animation: revealIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes revealIn {
  to { opacity:1; transform:translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width:480px) {
  .card { padding:28px 16px 36px; border-radius:22px; }
  .username { font-size:1.75rem; }
  .avatar { width:104px; height:104px; }
  .ring-3d { width:130px; height:130px; }
  .avatar-wrap { width:110px; height:110px; }
}
</style>
</head>
